<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>یارِ امتحان</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #f7f1e1;
    --paper-2: #efe6cf;
    --ink: #1f2a44;
    --ink-soft: #4a5578;
    --line: #c9beA0;
    --red: #b5432f;
    --red-2: #8f3223;
    --shadow: 0 10px 30px rgba(31,42,68,.12);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:'Vazirmatn', sans-serif;
    background:
      radial-gradient(circle at 20% -10%, rgba(181,67,47,.06), transparent 40%),
      radial-gradient(circle at 90% 110%, rgba(60,110,71,.06), transparent 40%),
      var(--paper);
    color:var(--ink);
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image: repeating-linear-gradient(to bottom, transparent 0px, transparent 33px, rgba(31,42,68,.05) 34px);
    pointer-events:none;
    z-index:0;
  }

  /* ---------- Auth screen ---------- */
  #authScreen{
    position:relative; z-index:1;
    width:100%; max-width:380px;
    margin:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    min-height:100vh;
    min-height:100dvh;
  }
  .auth-card{
    background:#fffdf7;
    border:1px solid var(--line);
    border-radius:16px;
    box-shadow:var(--shadow);
    padding:26px 22px;
  }
  .auth-card h1{
    font-family:'Caveat','Vazirmatn',sans-serif;
    font-size:34px;
    text-align:center;
    margin:0 0 4px;
  }
  .auth-card .sub{
    text-align:center;
    color:var(--ink-soft);
    font-size:12.5px;
    margin:0 0 18px;
  }
  .field{ margin-bottom:12px; }
  .field label{ display:block; font-size:12.5px; color:var(--ink-soft); margin-bottom:5px; }
  .field input{
    width:100%;
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 12px;
    font-family:'Vazirmatn',sans-serif;
    font-size:14.5px;
    background:var(--paper);
    color:var(--ink);
  }
  .field input:focus{ outline:none; border-color:var(--red); }
  .auth-btn{
    width:100%;
    background:var(--red);
    color:#fffdf7;
    border:none;
    border-radius:10px;
    padding:11px;
    font-weight:700;
    font-size:14.5px;
    cursor:pointer;
    margin-top:6px;
  }
  .auth-btn:hover{ background:var(--red-2); }
  .auth-switch{
    text-align:center;
    font-size:12.5px;
    color:var(--ink-soft);
    margin-top:14px;
  }
  .auth-switch a{ color:var(--red-2); font-weight:600; cursor:pointer; text-decoration:none; }
  .auth-error{
    background:rgba(181,67,47,.08);
    border:1px solid rgba(181,67,47,.3);
    color:var(--red-2);
    font-size:12.5px;
    padding:8px 10px;
    border-radius:8px;
    margin-bottom:12px;
    display:none;
  }

  /* ---------- App screen ---------- */
  #appScreen{
    display:none;
    position:relative; z-index:1;
    width:100%; height:100vh; height:100dvh;
    max-width:920px;
    padding:10px;
    gap:10px;
  }
  #appScreen.active{ display:flex; }

  /* Sidebar (history) */
  #sidebar{
    width:210px;
    flex:none;
    background:#fffdf7;
    border:1px solid var(--line);
    border-radius:14px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    box-shadow:var(--shadow);
  }
  #sidebar.hidden{ display:none; }
  .sidebar-head{
    padding:12px;
    border-bottom:1px solid var(--line);
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .sidebar-head span{ font-size:12px; font-weight:700; color:var(--ink-soft); }
  .new-chat-btn{
    background:var(--ink);
    color:var(--paper);
    border:none;
    border-radius:8px;
    font-size:11.5px;
    padding:5px 10px;
    cursor:pointer;
  }
  .conv-list{
    flex:1;
    overflow-y:auto;
    padding:6px;
  }
  .conv-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:4px;
    padding:9px 10px;
    border-radius:8px;
    font-size:12.5px;
    cursor:pointer;
    margin-bottom:3px;
    color:var(--ink);
  }
  .conv-item:hover, .conv-item.active{ background:var(--paper-2); }
  .conv-title{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
  .conv-del{ background:none; border:none; color:var(--ink-soft); cursor:pointer; font-size:13px; padding:2px 4px; }
  .conv-del:hover{ color:var(--red); }

  /* Main chat column */
  #main{
    flex:1;
    display:flex;
    flex-direction:column;
    min-width:0;
  }
  header{
    text-align:center;
    padding:2px 0 8px;
    flex:none;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
  }
  #menuToggle{
    background:none; border:1px solid var(--line); border-radius:8px;
    width:30px; height:30px; cursor:pointer; font-size:14px; color:var(--ink);
  }
  h1{
    font-family:'Caveat','Vazirmatn',sans-serif;
    font-size:26px;
    font-weight:700;
    margin:0;
    color:var(--ink);
  }
  .sub{ color:var(--ink-soft); font-size:11px; margin:0; }
  #logoutBtn{
    margin-right:auto;
    background:none; border:1px solid var(--line); border-radius:8px;
    font-size:11px; padding:5px 9px; cursor:pointer; color:var(--ink-soft);
  }

  .chat-wrap{
    flex:1;
    background:#fffdf7;
    border:1px solid var(--line);
    border-radius:16px;
    box-shadow:var(--shadow);
    display:flex;
    flex-direction:column;
    overflow:hidden;
    position:relative;
  }
  .messages{
    flex:1;
    padding:16px 16px 16px 12px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:12px;
    min-height:0;
  }
  .msg{
    max-width:82%;
    padding:11px 15px;
    border-radius:14px;
    font-size:14.5px;
    line-height:1.9;
    white-space:pre-wrap;
    word-wrap:break-word;
  }
  .msg.bot{ align-self:flex-start; background:var(--paper-2); border:1px solid var(--line); border-bottom-left-radius:4px; }
  .msg.user{ align-self:flex-end; background:var(--ink); color:var(--paper); border-bottom-right-radius:4px; }
  .msg .label{ display:block; font-size:10.5px; font-weight:700; opacity:.55; margin-bottom:4px; }
  .msg img, .msg video{ max-width:100%; border-radius:8px; margin-top:6px; display:block; }
  .typing{
    align-self:flex-start; display:flex; gap:4px; padding:12px 16px;
    background:var(--paper-2); border:1px solid var(--line); border-radius:14px; border-bottom-left-radius:4px;
  }
  .typing span{ width:6px;height:6px;border-radius:50%; background:var(--ink-soft); animation:bounce 1.2s infinite ease-in-out; }
  .typing span:nth-child(2){animation-delay:.15s;}
  .typing span:nth-child(3){animation-delay:.3s;}
  @keyframes bounce{ 0%,60%,100%{transform:translateY(0); opacity:.5;} 30%{transform:translateY(-4px); opacity:1;} }

  #filePreview{
    display:none;
    padding:8px 16px 0;
    align-items:center;
    gap:8px;
  }
  #filePreview.active{ display:flex; }
  #filePreview img, #filePreview video{ height:44px; border-radius:6px; }
  #filePreview span{ font-size:11.5px; color:var(--ink-soft); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #filePreview button{ background:none; border:none; color:var(--red); font-size:16px; cursor:pointer; }

  .input-row{
    display:flex;
    gap:8px;
    padding:14px 16px;
    border-top:1px solid var(--line);
    background:#fffdf7;
    align-items:flex-end;
  }
  #fileBtn{
    flex:none;
    background:var(--paper-2);
    border:1px solid var(--line);
    border-radius:10px;
    width:42px; height:42px;
    cursor:pointer;
    font-size:18px;
  }
  textarea{
    flex:1;
    resize:none;
    border:1px solid var(--line);
    border-radius:10px;
    padding:11px 13px;
    font-family:'Vazirmatn',sans-serif;
    font-size:14.5px;
    background:var(--paper);
    color:var(--ink);
    line-height:1.6;
    max-height:100px;
  }
  textarea:focus{ outline:none; border-color:var(--red); }
  button.send{
    background:var(--red); color:#fffdf7; border:none; border-radius:10px;
    padding:0 18px; height:42px; font-weight:700; font-size:14px; cursor:pointer;
  }
  button.send:hover{ background:var(--red-2); }
  button.send:disabled{ opacity:.5; cursor:not-allowed; }

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--line); border-radius:8px;}

  @media (max-width: 640px){
    #sidebar{ position:fixed; inset:10px 10px auto auto; height:calc(100% - 20px); z-index:20; }
    #sidebar.hidden{ display:none; }
  }
</style>
</head>
<body>

<!-- ==================== AUTH SCREEN ==================== -->
<div id="authScreen">
  <div class="auth-card">
    <h1>یارِ امتحان</h1>
    <p class="sub">دستیار درسی پایه‌های ۷،۸،۹،۱۱،۱۲</p>
    <div class="auth-error" id="authError"></div>

    <div id="loginForm">
      <div class="field"><label>نام کاربری</label><input type="text" id="loginUsername" autocomplete="username"></div>
      <div class="field"><label>رمز عبور</label><input type="password" id="loginPassword" autocomplete="current-password"></div>
      <button class="auth-btn" id="loginBtn">ورود</button>
      <p class="auth-switch">حساب نداری؟ <a id="showSignup">بساز</a></p>
    </div>

    <div id="signupForm" style="display:none;">
      <div class="field"><label>یه نام کاربری انتخاب کن</label><input type="text" id="signupUsername" autocomplete="username"></div>
      <div class="field"><label>یه رمز عبور بساز (حداقل ۴ کاراکتر)</label><input type="password" id="signupPassword" autocomplete="new-password"></div>
      <button class="auth-btn" id="signupBtn">ساخت حساب</button>
      <p class="auth-switch">قبلاً حساب ساختی؟ <a id="showLogin">وارد شو</a></p>
    </div>
  </div>
</div>

<!-- ==================== APP SCREEN ==================== -->
<div id="appScreen">
  <div id="sidebar" class="hidden">
    <div class="sidebar-head">
      <span>تاریخچه چت</span>
      <button class="new-chat-btn" id="newChatBtn">+ جدید</button>
    </div>
    <div class="conv-list" id="convList"></div>
  </div>

  <div id="main">
    <header>
      <button id="menuToggle">☰</button>
      <div>
        <h1>یارِ امتحان</h1>
        <p class="sub">پایه‌های ۷،۸،۹،۱۱،۱۲</p>
      </div>
      <button id="logoutBtn">خروج</button>
    </header>

    <div class="chat-wrap">
      <div class="messages" id="messages"></div>

      <div id="filePreview">
        <span id="fileNameLabel"></span>
        <button id="removeFile">✕</button>
      </div>

      <div class="input-row">
        <button id="fileBtn" title="ارسال عکس یا ویدیو">📎</button>
        <input type="file" id="fileInput" accept="image/*,video/*" style="display:none;">
        <textarea id="input" rows="1" placeholder="سوالتو از هر درسی بپرس..."></textarea>
        <button class="send" id="sendBtn">بفرست</button>
      </div>
    </div>
  </div>
</div>

<script>
let token = localStorage.getItem('yarToken') || null;
let currentUsername = localStorage.getItem('yarUsername') || null;
let currentConversationId = null;
let selectedFile = null;

const authScreen = document.getElementById('authScreen');
const appScreen = document.getElementById('appScreen');
const authError = document.getElementById('authError');

function showAuthError(msg){
  authError.textContent = msg;
  authError.style.display = 'block';
}
function clearAuthError(){ authError.style.display = 'none'; }

document.getElementById('showSignup').onclick = () => {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('signupForm').style.display = 'block';
  clearAuthError();
};
document.getElementById('showLogin').onclick = () => {
  document.getElementById('signupForm').style.display = 'none';
  document.getElementById('loginForm').style.display = 'block';
  clearAuthError();
};

document.getElementById('signupBtn').onclick = async () => {
  const username = document.getElementById('signupUsername').value.trim();
  const password = document.getElementById('signupPassword').value;
  clearAuthError();
  try{
    const res = await fetch('/api/signup', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if(!res.ok) return showAuthError(data.error || 'خطا در ثبت‌نام');
    loginSuccess(data.token, data.username);
  }catch(e){ showAuthError('مشکل در ارتباط با سرور'); }
};

document.getElementById('loginBtn').onclick = async () => {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  clearAuthError();
  try{
    const res = await fetch('/api/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if(!res.ok) return showAuthError(data.error || 'خطا در ورود');
    loginSuccess(data.token, data.username);
  }catch(e){ showAuthError('مشکل در ارتباط با سرور'); }
};

function loginSuccess(t, uname){
  token = t; currentUsername = uname;
  localStorage.setItem('yarToken', t);
  localStorage.setItem('yarUsername', uname);
  enterApp();
}

document.getElementById('logoutBtn').onclick = () => {
  localStorage.removeItem('yarToken');
  localStorage.removeItem('yarUsername');
  token = null; currentUsername = null;
  appScreen.classList.remove('active');
  authScreen.style.display = 'flex';
};

async function enterApp(){
  authScreen.style.display = 'none';
  appScreen.classList.add('active');
  await loadConversations();
  if(!currentConversationId){
    await createNewConversation();
  }
}

// ---------- Sidebar / conversations ----------
const sidebar = document.getElementById('sidebar');
document.getElementById('menuToggle').onclick = () => sidebar.classList.toggle('hidden');

async function loadConversations(){
  const res = await fetch('/api/conversations', { headers: authHeaders() });
  if(!res.ok) return;
  const data = await res.json();
  const list = document.getElementById('convList');
  list.innerHTML = '';
  data.conversations.forEach(c => {
    const item = document.createElement('div');
    item.className = 'conv-item' + (c.id === currentConversationId ? ' active' : '');
    item.innerHTML = `<span class="conv-title">${escapeHtml(c.title)}</span><button class="conv-del">🗑</button>`;
    item.querySelector('.conv-title').onclick = () => openConversation(c.id);
    item.querySelector('.conv-del').onclick = async (e) => {
      e.stopPropagation();
      await fetch('/api/conversations/' + c.id, { method:'DELETE', headers: authHeaders() });
      if(c.id === currentConversationId){ currentConversationId = null; }
      await loadConversations();
      if(!currentConversationId) await createNewConversation();
    };
    list.appendChild(item);
  });
  if(data.conversations.length && !currentConversationId){
    openConversation(data.conversations[0].id);
  }
}

document.getElementById('newChatBtn').onclick = createNewConversation;

async function createNewConversation(){
  const res = await fetch('/api/conversations', { method:'POST', headers: authHeaders() });
  const data = await res.json();
  currentConversationId = data.conversation.id;
  document.getElementById('messages').innerHTML = '';
  addMessage('bot', 'سلام! 👋 هر سوالی از هر درسی داری بپرس، یا یه عکس/ویدیو از تمرینت بفرست.');
  await loadConversations();
}

async function openConversation(id){
  currentConversationId = id;
  const res = await fetch('/api/conversations/' + id + '/messages', { headers: authHeaders() });
  const data = await res.json();
  const messagesEl = document.getElementById('messages');
  messagesEl.innerHTML = '';
  if(data.messages.length === 0){
    addMessage('bot', 'سلام! 👋 هر سوالی از هر درسی داری بپرس، یا یه عکس/ویدیو از تمرینت بفرست.');
  }else{
    data.messages.forEach(m => addMessage(m.role === 'assistant' ? 'bot' : 'user', m.content || (m.hasFile ? '📎 ' + (m.fileName||'فایل') : '')));
  }
  await loadConversations();
  sidebar.classList.add('hidden');
}

function authHeaders(extra){
  return Object.assign({ 'Authorization': 'Bearer ' + token }, extra || {});
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ---------- Chat ----------
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const fileBtn = document.getElementById('fileBtn');
const fileInput = document.getElementById('fileInput');
const filePreview = document.getElementById('filePreview');
const fileNameLabel = document.getElementById('fileNameLabel');

fileBtn.onclick = () => fileInput.click();
fileInput.onchange = () => {
  if(fileInput.files.length){
    selectedFile = fileInput.files[0];
    fileNameLabel.textContent = '📎 ' + selectedFile.name;
    filePreview.classList.add('active');
  }
};
document.getElementById('removeFile').onclick = () => {
  selectedFile = null;
  fileInput.value = '';
  filePreview.classList.remove('active');
};

function addMessage(role, text){
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
  const label = document.createElement('span');
  label.className = 'label';
  label.textContent = role === 'user' ? 'تو' : 'یارِ امتحان';
  div.appendChild(label);
  const body = document.createElement('span');
  body.textContent = text;
  div.appendChild(body);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping(){
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typingIndicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function hideTyping(){
  const t = document.getElementById('typingIndicator');
  if(t) t.remove();
}

async function sendMessage(){
  const text = inputEl.value.trim();
  if(!text && !selectedFile) return;
  if(!currentConversationId){ await createNewConversation(); }

  addMessage('user', text || ('📎 ' + (selectedFile ? selectedFile.name : '')));
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  showTyping();

  const formData = new FormData();
  formData.append('conversationId', currentConversationId);
  formData.append('message', text);
  if(selectedFile) formData.append('file', selectedFile);

  try{
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: authHeaders(),
      body: formData
    });
    const data = await response.json();
    hideTyping();

    if(!response.ok){
      addMessage('bot', 'خطا: ' + (data.error || 'مشکل نامشخص'));
      return;
    }
    addMessage('bot', data.reply);
    await loadConversations();
  }catch(err){
    hideTyping();
    addMessage('bot', 'مشکل در ارتباط با سرور: ' + err.message);
  }finally{
    sendBtn.disabled = false;
    selectedFile = null;
    fileInput.value = '';
    filePreview.classList.remove('active');
  }
}

sendBtn.addEventListener('click', sendMessage);
inputEl.addEventListener('keydown', (e) => {
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
});

// ---------- Boot ----------
if(token){ enterApp(); }
</script>
</body>
</html>
